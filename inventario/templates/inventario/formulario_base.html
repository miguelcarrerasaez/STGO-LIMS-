<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ titulo }} | LIMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">🔬 Sistema LIMS - Biobanco</span>
        <a href="{% url 'ingresar_muestra' %}" class="btn btn-outline-light btn-sm">Volver al Registro</a>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-secondary text-white">
                    <h5 class="mb-0">{{ titulo }}</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        
                        {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">{{ field.label }}</label>
                            {{ field }}
                            {% if field.help_text %}
                                <div class="form-text">{{ field.help_text }}</div>
                            {% endif %}
                            {% if field.errors %}
                                <div class="text-danger small mt-1">{{ field.errors }}</div>
                            {% endif %}
                        </div>
                        {% endfor %}

                        <hr>
                        <div class="d-flex justify-content-end">
                            <a href="{% url 'ingresar_muestra' %}" class="btn btn-light me-2">Cancelar</a>
                            <button type="submit" class="btn btn-success">💾 Guardar y Continuar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="escanerModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">📷 Escanear Tubo</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body text-center">
        <div id="reader" style="width: 100%; border-radius: 8px; overflow: hidden;"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
  let html5QrcodeScanner = null;
  let inputDestino = null;

  // Función que se llama al hacer clic en el botón de la cámara
  function abrirEscaner(idDelInput) {
      inputDestino = idDelInput; // Guardamos en qué cajita de texto vamos a escribir
      
      // Abrimos la ventana emergente
      var myModal = new bootstrap.Modal(document.getElementById('escanerModal'));
      myModal.show();

      // Encendemos la cámara con un pequeño retraso para que la ventana termine de abrir
      setTimeout(() => {
          if(!html5QrcodeScanner) {
              html5QrcodeScanner = new Html5QrcodeScanner(
                  "reader", { fps: 10, qrbox: {width: 250, height: 250} }, false
              );
          }
          html5QrcodeScanner.render(onScanSuccess, onScanFailure);
      }, 500);
  }

// Cuando la cámara detecta un QR con éxito
  function onScanSuccess(textoEscaneado, decodedResult) {
      // 1. Llenamos el campo original donde se presionó el botón (ej: BSI ID)
      document.getElementById(inputDestino).value = textoEscaneado;
      
      // 2. AUTO-DESGLOSE (Sample ID y Sequence)
      // Limpiamos espacios al inicio/final por si la cámara lee algo extra
      let textoLimpio = textoEscaneado.trim();
      
      // Verificamos si tiene algún tipo de espacio en el medio
      if (textoLimpio.includes(' ')) {
          
          // Dividimos el texto usando CUALQUIER tipo de espacio o tabulación
          let partes = textoLimpio.split(/\s+/);
          
          if (partes.length >= 2) {
              // Django SIEMPRE genera los inputs con el prefijo "id_" 
              let campoSample = document.getElementById('id_sample_id');
              let campoSequence = document.getElementById('id_sequence');
              
              // Inyectamos el primer fragmento (Ej: MAU11111)
              if (campoSample) {
                  campoSample.value = partes[0];
              }
              
              // Inyectamos el segundo fragmento (Ej: 1111)
              if (campoSequence) {
                  campoSequence.value = partes[1];
              }
          }
      }
      
      // 3. Apagamos la cámara
      html5QrcodeScanner.clear();
      
      // 4. Cerramos la ventana modal
      var myModalEl = document.getElementById('escanerModal');
      var modal = bootstrap.Modal.getInstance(myModalEl);
      modal.hide();
  }

  
  function onScanFailure(error) {
      // Mientras busca enfocar, tira errores internos que ignoramos
  }
  
  // Seguridad: Si el usuario cierra la ventana con la "X", apagamos la cámara manualmente
  document.getElementById('escanerModal').addEventListener('hidden.bs.modal', function () {
      if(html5QrcodeScanner){
          html5QrcodeScanner.clear();
      }
  });
</script>

</body>
</html>
