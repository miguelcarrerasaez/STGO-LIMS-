<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | STGO-LIMS Biobanco</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow border-0 rounded-lg">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold">🔬 Sistema STGO-LIMS</h2>
                        <p class="text-muted">Biobanco - Ingreso Restringido</p>
                    </div>
                    
                    <form method="POST">
                        {% csrf_token %}
                        
                        {% if form.errors %}
                            <div class="alert alert-danger text-center small">
                                Usuario o contraseña incorrectos.
                            </div>
                        {% endif %}

                        <div class="mb-3">
                            <label class="form-label fw-bold">Usuario</label>
                            <input type="text" name="username" class="form-control" placeholder="Ej: tecnóloga1" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Contraseña</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Ingresar al Sistema</button>
                    </form>
                    
                </div>
            </div>
            <div class="text-center mt-3 text-muted small">
                &copy; 2026 UC - Solo personal autorizado
            </div>
        </div>
    </div>
</div>

</body>
</html>
